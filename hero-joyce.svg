<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1500" role="img" aria-labelledby="title desc">
  <title id="title">Dra Joyce Radis</title>
  <desc id="desc">Retrato profissional da Dra Joyce Radis</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f2eb"/>
      <stop offset="100%" stop-color="#efe5d8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#8c7766" flood-opacity=".18"/>
    </filter>
    <clipPath id="clip">
      <rect x="36" y="36" width="828" height="1428" rx="42" ry="42"/>
    </clipPath>
  </defs>
  <rect width="900" height="1500" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="18" y="18" width="864" height="1464" rx="56" fill="#ffffff" opacity=".88"/>
  </g>
  <g clip-path="url(#clip)">
    <image href="data:image/jpeg;base64," x="0" y="0" width="900" height="1500" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <rect x="36" y="36" width="828" height="1428" rx="42" fill="none" stroke="rgba(255,255,255,.78)" stroke-width="3"/>
</svg>
